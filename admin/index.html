<!DOCTYPE html>
<html lang="en">

<head>

<title>AM Sports Admin</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<header>

<nav class="navbar">

AM Sports Admin
</span>

</div>


</nav>

</header>





<section class="admin-page">

Dashboard

>

>

</button>

<h2>
Products List
</h2>


<div id="admin-products">

</div>



</div>



</section>
